name: Publish Helm Chart (OCI)

on:
  push:
    branches:
      - main
    paths:
      - "helm/linkhub/**"
      - ".github/workflows/helm-oci-publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  CHART_DIR: helm/linkhub
  OCI_REPO: oci://ghcr.io/tron4x/charts

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR
        run: |
          GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"

          if [ -z "${GHCR_TOKEN}" ]; then
            echo "ERROR: Secret GHCR_TOKEN is missing."
            echo "Create a classic PAT for user 'tron4x' with: write:packages, read:packages"
            exit 1
          fi

          echo "${GHCR_TOKEN}" | helm registry login ghcr.io \
            --username "tron4x" \
            --password-stdin

      - name: Validate chart
        run: |
          helm lint "${CHART_DIR}"

      - name: Package Helm chart
        run: |
          mkdir -p dist
          helm dependency update "${CHART_DIR}"
          helm package "${CHART_DIR}" --destination dist

      - name: Push chart to GHCR as OCI
        run: |
          CHART_PACKAGE=$(ls dist/*.tgz)
          echo "Publishing to ${OCI_REPO}"
          helm push "${CHART_PACKAGE}" "${OCI_REPO}"
